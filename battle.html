<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Knight Battle Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

    :root {
      --dark:    #0f0d0a;
      --dark2:   #1c1810;
      --dark3:   #26201a;
      --gold:    #c9a84c;
      --gold2:   #e8c96a;
      --red:     #8b1a1a;
      --red2:    #c0392b;
      --text:    #e8dcc8;
      --muted:   #a89880;
      --hp-green:#2ecc71;
      --hp-red:  #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark);
      background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 17px;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 32px 16px 16px;
      border-bottom: 1px solid rgba(201,168,76,0.25);
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    header p {
      color: var(--muted);
      font-style: italic;
      margin-top: 6px;
      font-size: 15px;
    }

    .back-link {
      display: inline-block;
      margin: 12px 0 0;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: var(--gold); border-color: var(--gold); }

    .arena {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .combatants {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 24px;
    }

    .fighter-card {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 6px;
      padding: 16px;
      text-align: center;
    }

    .fighter-card.enemy {
      border-color: rgba(139,26,26,0.5);
    }

    .fighter-name {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .fighter-card.enemy .fighter-name { color: #e07070; }

    .fighter-class {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 12px;
    }

    .hp-label {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .hp-bar-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .hp-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease, background-color 0.5s;
      background: var(--hp-green);
    }

    .hp-number {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: var(--text);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
      margin-top: 12px;
      text-align: left;
    }

    .stat-row { font-size: 13px; color: var(--muted); }
    .stat-row span { color: var(--text); font-weight: 600; }

    .vs-block {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--gold);
      padding-top: 40px;
    }

    .setup-section {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .setup-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 16px;
      border-left: 3px solid var(--red);
      padding-left: 10px;
    }

    .hero-select {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .hero-btn {
      background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 4px;
      padding: 10px 8px;
      cursor: pointer;
      color: var(--text);
      font-family: 'Crimson Text', serif;
      font-size: 14px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .hero-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .hero-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--gold2); }
    .hero-btn .hero-btn-name { font-family: 'Cinzel', serif; font-size: 13px; display: block; margin-bottom: 2px; }
    .hero-btn .hero-btn-class { font-size: 12px; color: var(--muted); font-style: italic; }

    .weapon-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .weapon-btn {
      background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      padding: 7px 14px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }

    .weapon-btn:hover { border-color: var(--gold); color: var(--gold); }
    .weapon-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

    .battle-btn {
      width: 100%;
      padding: 14px;
      background: var(--red);
      border: none;
      border-radius: 4px;
      color: var(--gold2);
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }

    .battle-btn:hover { background: var(--red2); }
    .battle-btn:active { transform: scale(0.98); }
    .battle-btn:disabled { background: #444; color: #777; cursor: not-allowed; }

    .log-box {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 6px;
      padding: 16px;
      min-height: 180px;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-box h2 {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .log-entry {
      font-size: 15px;
      line-height: 1.6;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .log-entry.player-hit { color: #a8d8a8; }
    .log-entry.enemy-hit  { color: #e07070; }
    .log-entry.miss       { color: var(--muted); font-style: italic; }
    .log-entry.result     { color: var(--gold); font-family: 'Cinzel', serif; font-size: 16px; margin-top: 8px; }
    .log-entry.narration  { color: var(--muted); font-style: italic; font-size: 14px; }

    .result-banner {
      display: none;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      border-radius: 6px;
      font-family: 'Cinzel', serif;
    }

    .result-banner.victory {
      display: block;
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.4);
      color: #2ecc71;
    }

    .result-banner.defeat {
      display: block;
      background: rgba(139,26,26,0.2);
      border: 1px solid rgba(139,26,26,0.5);
      color: #e07070;
    }

    .result-banner h2 { font-size: 28px; margin-bottom: 6px; }
    .result-banner p  { font-size: 14px; color: var(--muted); font-family: 'Crimson Text', serif; font-style: italic; }

    .replay-btn {
      margin-top: 14px;
      padding: 9px 24px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 4px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .replay-btn:hover { background: var(--gold); color: var(--dark); }
  </style>
</head>
<body>

<header>
  <h1>Black Knight Battle Simulator</h1>
  <p>Dare to face the general of Daein...</p>
  <a href="scratch.html" class="back-link">← Back to Black Knight</a>
</header>

<div class="arena">

  <div class="combatants">
    <div class="fighter-card" id="player-card">
      <div class="fighter-name" id="p-name">—</div>
      <div class="fighter-class" id="p-class">Choose a hero</div>
      <div class="hp-label">HP</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="p-hp-bar" style="width:100%"></div></div>
      <div class="hp-number"><span id="p-hp">—</span> / <span id="p-maxhp">—</span></div>
      <div class="stats-grid" id="p-stats"></div>
    </div>

    <div class="vs-block">VS</div>

    <div class="fighter-card enemy" id="enemy-card">
      <div class="fighter-name" id="bk-name">The Black Knight</div>
      <div class="fighter-class">General of Daein</div>
      <div class="hp-label">HP</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="bk-hp-bar" style="width:100%"></div></div>
      <div class="hp-number"><span id="bk-hp">60</span> / <span id="bk-maxhp">60</span></div>
      <div class="stats-grid">
        <div class="stat-row">ATK <span>34</span></div>
        <div class="stat-row">DEF <span>28</span></div>
        <div class="stat-row">SPD <span>15</span></div>
        <div class="stat-row">HIT <span>80%</span></div>
      </div>
    </div>
  </div>

  <div class="setup-section">
    <h2>Choose Your Hero</h2>
    <div class="hero-select" id="hero-select"></div>
    <h2 style="margin-top:16px">Choose Your Weapon</h2>
    <div class="weapon-row" id="weapon-select"></div>
  </div>

  <button class="battle-btn" id="battle-btn" disabled onclick="startBattle()">Begin Battle</button>

  <div class="log-box">
    <h2>Battle Log</h2>
    <div id="log"></div>
  </div>

  <div class="result-banner" id="result-banner">
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <button class="replay-btn" onclick="resetGame()">Fight Again</button>
  </div>

</div>

<script>
const HEROES = [
  { name:"Ike", cls:"Vanguard", hp:52, atk:22, def:18, spd:20, hit:85, quote:"I fight for my friends." },
  { name:"Marth", cls:"Altean Prince", hp:44, atk:18, def:14, spd:24, hit:90, quote:"Everyone can change." },
  { name:"Roy", cls:"Young Lion", hp:46, atk:19, def:13, spd:22, hit:88, quote:"There must be another way!" },
  { name:"Sigurd", cls:"Holy Knight", hp:56, atk:24, def:20, spd:18, hit:82, quote:"For Chalphy!" },
  { name:"Chrom", cls:"Exalt", hp:50, atk:21, def:16, spd:19, hit:86, quote:"I choose to fight." },
  { name:"Ephraim", cls:"Prince of Renais", hp:48, atk:23, def:15, spd:21, hit:84, quote:"I never retreat." },
];

const WEAPONS = [
  { name:"Ragnell", bonus:{ atk:6, def:4, hit:5 } },
  { name:"Falchion", bonus:{ atk:5, def:2, hit:8 } },
  { name:"Durandal", bonus:{ atk:7, def:0, hit:3 } },
  { name:"Silver Lance", bonus:{ atk:4, def:0, hit:10 } },
  { name:"Iron Sword", bonus:{ atk:1, def:0, hit:15 } },
];

const BK = { name:"The Black Knight", hp:60, maxHp:60, atk:34, def:28, spd:15, hit:80 };

let selectedHero = null;
let selectedWeapon = null;
let playerState = null;
let bkState = null;
let battling = false;

function buildHeroButtons() {
  const wrap = document.getElementById('hero-select');
  HEROES.forEach((h, i) => {
    const btn = document.createElement('button');
    btn.className = 'hero-btn';
    btn.innerHTML = `<span class="hero-btn-name">${h.name}</span><span class="hero-btn-class">${h.cls}</span>`;
    btn.onclick = () => selectHero(i, btn);
    wrap.appendChild(btn);
  });
}

function buildWeaponButtons() {
  const wrap = document.getElementById('weapon-select');
  WEAPONS.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'weapon-btn';
    btn.textContent = w.name;
    btn.onclick = () => selectWeapon(i, btn);
    wrap.appendChild(btn);
  });
}

function selectHero(i, btn) {
  selectedHero = HEROES[i];
  document.querySelectorAll('.hero-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updatePlayerCard();
  checkReady();
}

function selectWeapon(i, btn) {
  selectedWeapon = WEAPONS[i];
  document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updatePlayerCard();
  checkReady();
}

function updatePlayerCard() {
  if (!selectedHero) return;
  const w = selectedWeapon ? selectedWeapon.bonus : { atk:0, def:0, hit:0 };
  const atk = selectedHero.atk + w.atk;
  const def = selectedHero.def + w.def;
  const hit = selectedHero.hit + w.hit;
  document.getElementById('p-name').textContent = selectedHero.name;
  document.getElementById('p-class').textContent = selectedHero.cls + (selectedWeapon ? ' · ' + selectedWeapon.name : '');
  document.getElementById('p-hp').textContent = selectedHero.hp;
  document.getElementById('p-maxhp').textContent = selectedHero.hp;
  document.getElementById('p-hp-bar').style.width = '100%';
  document.getElementById('p-stats').innerHTML =
    `<div class="stat-row">ATK <span>${atk}</span></div>
     <div class="stat-row">DEF <span>${def}</span></div>
     <div class="stat-row">SPD <span>${selectedHero.spd}</span></div>
     <div class="stat-row">HIT <span>${hit}%</span></div>`;
}

function checkReady() {
  document.getElementById('battle-btn').disabled = !(selectedHero && selectedWeapon);
}

function log(text, cls) {
  const div = document.createElement('div');
  div.className = 'log-entry ' + (cls || '');
  div.textContent = text;
  const box = document.getElementById('log');
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function calcDamage(atk, def) {
  const base = Math.max(0, atk - def);
  const variance = Math.floor(Math.random() * 5) - 2;
  return Math.max(1, base + variance);
}

function updateHpBar(id, barId, current, max) {
  const pct = Math.max(0, Math.round((current / max) * 100));
  document.getElementById(id).textContent = Math.max(0, current);
  const bar = document.getElementById(barId);
  bar.style.width = pct + '%';
  bar.style.backgroundColor = pct > 50 ? '#2ecc71' : pct > 25 ? '#f39c12' : '#e74c3c';
}

async function startBattle() {
  if (battling) return;
  battling = true;

  document.getElementById('battle-btn').disabled = true;
  document.getElementById('result-banner').className = 'result-banner';
  document.getElementById('log').innerHTML = '';

  const w = selectedWeapon.bonus;
  playerState = {
    name: selectedHero.name,
    hp: selectedHero.hp,
    maxHp: selectedHero.hp,
    atk: selectedHero.atk + w.atk,
    def: selectedHero.def + w.def,
    spd: selectedHero.spd,
    hit: selectedHero.hit + w.hit,
    quote: selectedHero.quote,
  };

  bkState = { ...BK };

  updateHpBar('p-hp', 'p-hp-bar', playerState.hp, playerState.maxHp);
  updateHpBar('bk-hp', 'bk-hp-bar', bkState.hp, bkState.maxHp);

  log(`${playerState.name}: "${playerState.quote}"`, 'narration');
  log('The Black Knight: "Foolish. You cannot defeat me."', 'narration');
  await delay(800);

  let round = 1;
  while (playerState.hp > 0 && bkState.hp > 0) {
    log(`— Round ${round} —`, 'narration');
    await delay(400);

    const playerFirst = playerState.spd >= bkState.spd;

    if (playerFirst) {
      await playerAttacks();
      if (bkState.hp <= 0) break;
      await delay(400);
      await bkAttacks();
    } else {
      await bkAttacks();
      if (playerState.hp <= 0) break;
      await delay(400);
      await playerAttacks();
    }

    if (playerState.spd >= bkState.spd + 4) {
      await delay(300);
      log(`${playerState.name} attacks again! (double attack)`, 'narration');
      await playerAttacks();
    }

    round++;
    await delay(600);
    if (round > 20) { log('The battle drags on endlessly...', 'narration'); break; }
  }

  await delay(400);
  showResult();
}

async function playerAttacks() {
  const hits = Math.random() * 100 < playerState.hit;
  if (!hits) {
    log(`${playerState.name} attacks — but misses!`, 'miss');
    return;
  }
  const dmg = calcDamage(playerState.atk, bkState.def);
  bkState.hp = Math.max(0, bkState.hp - dmg);
  updateHpBar('bk-hp', 'bk-hp-bar', bkState.hp, bkState.maxHp);
  log(`${playerState.name} strikes for ${dmg} damage! (BK HP: ${bkState.hp})`, 'player-hit');
  await delay(300);
}

async function bkAttacks() {
  const hits = Math.random() * 100 < bkState.hit;
  if (!hits) {
    log('The Black Knight swings — and misses!', 'miss');
    return;
  }
  const dmg = calcDamage(bkState.atk, playerState.def);
  playerState.hp = Math.max(0, playerState.hp - dmg);
  updateHpBar('p-hp', 'p-hp-bar', playerState.hp, playerState.maxHp);
  log(`The Black Knight strikes for ${dmg} damage! (Your HP: ${playerState.hp})`, 'enemy-hit');
  await delay(300);
}

function showResult() {
  const banner = document.getElementById('result-banner');
  if (bkState.hp <= 0) {
    banner.className = 'result-banner victory';
    document.getElementById('result-title').textContent = 'Victory!';
    document.getElementById('result-msg').textContent = `${playerState.name} has defeated the Black Knight. The armor falls silent.`;
    log(`${playerState.name} defeats the Black Knight!`, 'result');
  } else if (playerState.hp <= 0) {
    banner.className = 'result-banner defeat';
    document.getElementById('result-title').textContent = 'Defeated.';
    document.getElementById('result-msg').textContent = '"You lack the strength to face me." — The Black Knight';
    log(`${playerState.name} has fallen. The Black Knight stands victorious.`, 'result');
  } else {
    banner.className = 'result-banner defeat';
    document.getElementById('result-title').textContent = 'Stalemate.';
    document.getElementById('result-msg').textContent = 'Neither warrior could land the finishing blow.';
  }
  battling = false;
}

function resetGame() {
  playerState = null;
  bkState = null;
  battling = false;
  selectedHero = null;
  selectedWeapon = null;
  document.querySelectorAll('.hero-btn, .weapon-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('battle-btn').disabled = true;
  document.getElementById('log').innerHTML = '';
  document.getElementById('result-banner').className = 'result-banner';
  document.getElementById('p-name').textContent = '—';
  document.getElementById('p-class').textContent = 'Choose a hero';
  document.getElementById('p-hp').textContent = '—';
  document.getElementById('p-maxhp').textContent = '—';
  document.getElementById('p-hp-bar').style.width = '100%';
  document.getElementById('p-stats').innerHTML = '';
  updateHpBar('bk-hp', 'bk-hp-bar', 60, 60);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

buildHeroButtons();
buildWeaponButtons();
</script>

<a href="index.html">Back to Home</a>

</body>
</html>
